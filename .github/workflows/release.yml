name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create tags and releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate version tag
        id: version
        run: |
          TAG="v$(date +'%Y.%m.%d').${{ github.run_number }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Generated tag: $TAG"

      - name: Inject version into index.html
        run: |
          sed -i "s|id=\"app-version\">dev<|id=\"app-version\">${{ steps.version.outputs.tag }}<|" index.html

      - name: Package release files
        run: |
          tar -czf diagram-editor.tar.gz \
            index.html editor.js diagram.css README.md \
            icons/manifest.js icons/manifest.json \
            icons/AWS icons/Azure icons/GCP \
            scripts/generate-manifest.js

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Diagram Editor ${{ steps.version.outputs.tag }}" \
            --generate-notes \
            diagram-editor.tar.gz
