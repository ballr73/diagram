<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagram Editor</title>
  <link rel="stylesheet" href="diagram.css">
</head>
<body>
  <div id="app">
    <div id="diagram-title">Untitled diagram</div>
    <div id="toolbar">
      <div class="tool-group" id="new-group">
        <button id="btn-new" title="New diagram">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 2 L9 2 L13 6 L13 14 C13 14.6 12.6 15 12 15 L4 15 C3.4 15 3 14.6 3 14 Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M9 2 L9 6 L13 6" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <line x1="8" y1="9" x2="8" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="6" y1="11" x2="10" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="tool-group toolbar-separator" id="file-group">
        <button id="btn-open" title="Open diagram (JSON)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 4.5 C2 3.7 2.7 3 3.5 3 L6.5 3 L8 5 L13 5 C13.8 5 14 5.5 14 6 L14 12.5 C14 13.3 13.3 14 12.5 14 L3.5 14 C2.7 14 2 13.3 2 12.5 Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </button>
        <button id="btn-save" title="Save diagram (JSON)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="2" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <rect x="5" y="2" width="6" height="4" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
            <rect x="4" y="8" width="8" height="5" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
          </svg>
        </button>
        <button id="btn-save-as" title="Save As — save with a new name" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="2" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <rect x="5" y="2" width="6" height="4" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
            <rect x="4" y="8" width="8" height="5" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
            <path d="M10 11.5 L12 11.5 M11 10.5 L11 12.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </button>
        <input type="file" id="file-input" accept=".json" style="display:none">
      </div>
      <div class="tool-group" id="zoom-group">
        <button id="btn-zoom-out" title="Zoom out (Ctrl+-)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/>
            <line x1="4.5" y1="7" x2="9.5" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="11" y1="11" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <select id="zoom-select" title="Zoom level">
          <option value="0.25">25%</option>
          <option value="0.5">50%</option>
          <option value="0.75">75%</option>
          <option value="1" selected>100%</option>
          <option value="1.25">125%</option>
          <option value="1.5">150%</option>
          <option value="2">200%</option>
          <option value="fit">Fit</option>
        </select>
        <button id="btn-zoom-in" title="Zoom in (Ctrl+=)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/>
            <line x1="7" y1="4.5" x2="7" y2="9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="4.5" y1="7" x2="9.5" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="11" y1="11" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="tool-group toolbar-separator">
        <button id="btn-undo" title="Undo (Ctrl+Z)">
          <svg width="16" height="16" viewBox="0 0 16 16"><path d="M3 8 A5 5 0 1 1 8 13" fill="none" stroke="currentColor" stroke-width="1.5"/><polyline points="3,4 3,8 7,8" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        </button>
        <button id="btn-redo" title="Redo (Ctrl+Y)">
          <svg width="16" height="16" viewBox="0 0 16 16"><path d="M13 8 A5 5 0 1 0 8 13" fill="none" stroke="currentColor" stroke-width="1.5"/><polyline points="13,4 13,8 9,8" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="tool-group toolbar-separator">
        <button id="btn-cut" title="Cut (Ctrl+X)" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16"><line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="3" cy="13" r="2" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="13" cy="13" r="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <button id="btn-copy" title="Copy (Ctrl+C)" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16"><rect x="5" y="2" width="9" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="5" width="9" height="10" rx="1" fill="#1e293b" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <button id="btn-paste" title="Paste (Ctrl+V)" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16"><rect x="3" y="4" width="10" height="11" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M6 4 V3 Q6 1 8 1 Q10 1 10 3 V4" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <button id="btn-duplicate" title="Duplicate (Ctrl+D)" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16"><rect x="5" y="5" width="9" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="2" width="9" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="6.5" y1="6.5" x2="9.5" y2="6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="8" y1="5" x2="8" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="tool-group toolbar-separator">
        <button id="btn-bring-front" title="Bring to Front" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16">
            <rect x="4" y="6" width="8" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <rect x="1" y="9" width="8" height="6" rx="1" fill="#1e293b" stroke="currentColor" stroke-width="1.3" opacity="0.6"/>
            <polyline points="8,5 8,1 12,1" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="8" y1="1" x2="8" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="btn-send-back" title="Send to Back" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16">
            <rect x="4" y="3" width="8" height="7" rx="1" fill="#1e293b" stroke="currentColor" stroke-width="1.3" opacity="0.6"/>
            <rect x="1" y="6" width="8" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <line x1="12" y1="11" x2="12" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <polyline points="8,15 12,15 12,11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="tool-group toolbar-separator" id="align-group">
        <span class="shape-label">Align:</span>
        <button id="btn-align-left" class="shape-btn" title="Align left edges" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16">
            <line x1="3" y1="1" x2="3" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <rect x="3" y="3" width="9" height="3" rx="0.5" fill="currentColor" opacity="0.8"/>
            <rect x="3" y="10" width="6" height="3" rx="0.5" fill="currentColor" opacity="0.8"/>
          </svg>
        </button>
        <button id="btn-align-center-h" class="shape-btn" title="Align centers horizontally" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16">
            <line x1="8" y1="1" x2="8" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <rect x="3" y="3" width="10" height="3" rx="0.5" fill="currentColor" opacity="0.8"/>
            <rect x="5" y="10" width="6" height="3" rx="0.5" fill="currentColor" opacity="0.8"/>
          </svg>
        </button>
        <button id="btn-align-right" class="shape-btn" title="Align right edges" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16">
            <line x1="13" y1="1" x2="13" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <rect x="4" y="3" width="9" height="3" rx="0.5" fill="currentColor" opacity="0.8"/>
            <rect x="7" y="10" width="6" height="3" rx="0.5" fill="currentColor" opacity="0.8"/>
          </svg>
        </button>
        <button id="btn-align-top" class="shape-btn" title="Align top edges" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16">
            <line x1="1" y1="3" x2="15" y2="3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <rect x="3" y="3" width="3" height="9" rx="0.5" fill="currentColor" opacity="0.8"/>
            <rect x="10" y="3" width="3" height="6" rx="0.5" fill="currentColor" opacity="0.8"/>
          </svg>
        </button>
        <button id="btn-align-center-v" class="shape-btn" title="Align centers vertically" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16">
            <line x1="1" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <rect x="3" y="3" width="3" height="10" rx="0.5" fill="currentColor" opacity="0.8"/>
            <rect x="10" y="5" width="3" height="6" rx="0.5" fill="currentColor" opacity="0.8"/>
          </svg>
        </button>
        <button id="btn-align-bottom" class="shape-btn" title="Align bottom edges" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16">
            <line x1="1" y1="13" x2="15" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <rect x="3" y="4" width="3" height="9" rx="0.5" fill="currentColor" opacity="0.8"/>
            <rect x="10" y="7" width="3" height="6" rx="0.5" fill="currentColor" opacity="0.8"/>
          </svg>
        </button>
        <button id="btn-dist-h" class="shape-btn" title="Distribute horizontally (equal gaps)" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16">
            <rect x="1" y="5" width="3" height="6" rx="0.5" fill="currentColor" opacity="0.8"/>
            <rect x="6.5" y="5" width="3" height="6" rx="0.5" fill="currentColor" opacity="0.8"/>
            <rect x="12" y="5" width="3" height="6" rx="0.5" fill="currentColor" opacity="0.8"/>
            <line x1="4" y1="8" x2="6.5" y2="8" stroke="currentColor" stroke-width="1" opacity="0.6"/>
            <line x1="9.5" y1="8" x2="12" y2="8" stroke="currentColor" stroke-width="1" opacity="0.6"/>
          </svg>
        </button>
        <button id="btn-dist-v" class="shape-btn" title="Distribute vertically (equal gaps)" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16">
            <rect x="5" y="1" width="6" height="3" rx="0.5" fill="currentColor" opacity="0.8"/>
            <rect x="5" y="6.5" width="6" height="3" rx="0.5" fill="currentColor" opacity="0.8"/>
            <rect x="5" y="12" width="6" height="3" rx="0.5" fill="currentColor" opacity="0.8"/>
            <line x1="8" y1="4" x2="8" y2="6.5" stroke="currentColor" stroke-width="1" opacity="0.6"/>
            <line x1="8" y1="9.5" x2="8" y2="12" stroke="currentColor" stroke-width="1" opacity="0.6"/>
          </svg>
        </button>
      </div>
      <div class="tool-group toolbar-separator">
        <button id="btn-export-svg" title="Export diagram as SVG">
          <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 2 L8 10 M5 7 L8 10 L11 7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M3 12 L3 14 L13 14 L13 12" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          SVG
        </button>
        <button id="btn-export-png" title="Export diagram as PNG">
          <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 2 L8 10 M5 7 L8 10 L11 7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M3 12 L3 14 L13 14 L13 12" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          PNG
        </button>
      </div>

      <div id="toolbar-status"></div>
    </div>

    <div id="main">
      <div id="left-toolbar">
        <button class="tool-btn" data-tool="select" title="Select — click, drag to move/resize (S)">
          <svg width="20" height="20" viewBox="0 0 16 16"><path d="M2 2 L2 12 L5.5 9 L7.5 13.5 L9 12.8 L7 8.3 L11 8.3 Z" fill="currentColor"/></svg>
          <span>Select</span>
        </button>
        <button class="tool-btn" data-tool="box" title="Shape — click and drag to draw (B)">
          <svg width="20" height="20" viewBox="0 0 16 16"><rect x="2" y="4" width="12" height="8" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          <span>Shape</span>
        </button>
        <button class="tool-btn" data-tool="connector" title="Connector — drag from one box to another (C)">
          <svg width="20" height="20" viewBox="0 0 16 16"><line x1="2" y1="8" x2="11" y2="8" stroke="currentColor" stroke-width="1.5"/><polygon points="11,5 15,8 11,11" fill="currentColor"/></svg>
          <span>Connect</span>
        </button>
        <button class="tool-btn" data-tool="line" title="Line — click and drag to draw a free line (L)">
          <svg width="20" height="20" viewBox="0 0 16 16"><line x1="2" y1="14" x2="14" y2="2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="2" cy="14" r="2" fill="currentColor"/><circle cx="14" cy="2" r="2" fill="currentColor"/></svg>
          <span>Line</span>
        </button>
        <button class="tool-btn" data-tool="text" title="Text — click canvas for annotation, click element to edit (T)">
          <svg width="20" height="20" viewBox="0 0 16 16"><text x="3" y="13" font-size="13" font-weight="bold" fill="currentColor">T</text></svg>
          <span>Text</span>
        </button>
        <div class="left-tb-sep"></div>
        <button class="tool-btn" id="btn-toggle-icons" title="Icon Library (I)">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.3"/>
            <rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.3"/>
            <rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.3"/>
            <rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.3"/>
          </svg>
          <span>Icons</span>
        </button>
        <div class="left-tb-sep"></div>
        <button class="shape-btn active" data-shape="box" title="Box">
          <svg width="16" height="16" viewBox="0 0 16 16"><rect x="1" y="3" width="14" height="10" fill="none" stroke="currentColor" stroke-width="1.5" rx="1"/></svg>
        </button>
        <button class="shape-btn" data-shape="circle" title="Circle">
          <svg width="16" height="16" viewBox="0 0 16 16"><ellipse cx="8" cy="8" rx="6" ry="6" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <button class="shape-btn" data-shape="oval" title="Oval">
          <svg width="16" height="16" viewBox="0 0 16 16"><ellipse cx="8" cy="8" rx="7" ry="4.5" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <button class="shape-btn" data-shape="diamond" title="Diamond">
          <svg width="16" height="16" viewBox="0 0 16 16"><polygon points="8,1 15,8 8,15 1,8" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <button class="shape-btn" data-shape="triangle" title="Triangle">
          <svg width="16" height="16" viewBox="0 0 16 16"><polygon points="8,1 15,14 1,14" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <button class="shape-btn" data-shape="parallelogram" title="Parallelogram">
          <svg width="16" height="16" viewBox="0 0 16 16"><polygon points="4,3 15,3 12,13 1,13" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <div id="app-version">dev</div>
      </div>
      <div id="icon-panel" class="icon-panel-closed">
        <div id="icon-panel-header">
          <input id="icon-search" type="text" placeholder="Search icons…" autocomplete="off" />
        </div>
        <div id="icon-tree"></div>
      </div>
      <div id="canvas-container">
        <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="7"
                    refX="10" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
              <path d="M0,0 L10,3.5 L0,7 Z" class="arrow-fill"/>
            </marker>
            <marker id="arrowhead-sel" markerWidth="10" markerHeight="7"
                    refX="10" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
              <path d="M0,0 L10,3.5 L0,7 Z" class="arrow-fill-sel"/>
            </marker>
            <marker id="arrowhead-start" markerWidth="10" markerHeight="7"
                    refX="10" refY="3.5" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
              <path d="M0,0 L10,3.5 L0,7 Z" class="arrow-fill"/>
            </marker>
            <marker id="arrowhead-start-sel" markerWidth="10" markerHeight="7"
                    refX="10" refY="3.5" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
              <path d="M0,0 L10,3.5 L0,7 Z" class="arrow-fill-sel"/>
            </marker>
            <!-- Line end symbols: dot and square, normal + selected -->
            <marker id="dot-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
              <circle cx="4" cy="4" r="3" class="line-sym-fill"/>
            </marker>
            <marker id="dot-marker-sel" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
              <circle cx="4" cy="4" r="3" class="line-sym-fill-sel"/>
            </marker>
            <marker id="square-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
              <rect x="1" y="1" width="6" height="6" class="line-sym-fill"/>
            </marker>
            <marker id="square-marker-sel" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
              <rect x="1" y="1" width="6" height="6" class="line-sym-fill-sel"/>
            </marker>
          </defs>
          <g id="bg-annotations-layer"></g>
          <g id="shapes-layer"></g>
          <g id="lines-layer"></g>
          <g id="annotations-layer"></g>
          <g id="ui-layer"></g>
        </svg>
      </div>

      <div id="properties-panel">
        <div id="properties-header">Properties</div>
        <div id="properties-content">
          <p class="no-selection">Nothing selected</p>
        </div>
        <div id="properties-hint">
          <p>Keyboard shortcuts:</p>
          <ul>
            <li><kbd>S</kbd> Select tool</li>
            <li><kbd>B</kbd> Box tool</li>
            <li><kbd>C</kbd> Connector tool</li>
            <li><kbd>L</kbd> Line tool</li>
            <li><kbd>T</kbd> Text tool</li>
            <li><kbd>Del</kbd> Delete selected</li>
            <li><kbd>Ctrl+Z</kbd> Undo</li>
            <li><kbd>Ctrl+Y</kbd> Redo</li>
            <li><kbd>Dbl-click</kbd> Edit label</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
  <script src="icons/manifest.js"></script>
  <script src="editor.js"></script>
</body>
</html>
